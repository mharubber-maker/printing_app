<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام ERP - بيت الطباعة{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --bg-table-head: #2d1a00;
            --bg-table-hover: rgba(245, 166, 35, 0.05);
            --text-primary: #ffffff;
            --text-muted: #a0a0a0;
            --gold-dark: #f5a623;
            --gold-subtle: rgba(245, 166, 35, 0.1);
            --border-color: #333333;
            --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 24px;
            --radius-md: 8px; --text-xs: 11px; --text-base: 14px; --text-lg: 18px;
            --font-black: 900;
            --sidebar-width: 260px;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== SIDEBAR (ديناميكية الآن) ===== */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-card);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            box-shadow: -4px 0 15px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* كلاس الإخفاء الجديد */
        .sidebar.collapsed {
            transform: translateX(100%);
        }

        .sidebar-header {
            padding: var(--space-4);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, #2d1a00, #1a0f00);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-logo {
            width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--gold-dark);
            margin-bottom: 12px; object-fit: cover; box-shadow: 0 0 15px rgba(245, 166, 35, 0.3);
            background-color: #1a0f00;
        }

        .sidebar-header h1 { color: var(--gold-dark); font-size: 20px; margin: 0; font-weight: 900; letter-spacing: 0.5px; }

        .nav-links { padding: var(--space-4) var(--space-3); display: flex; flex-direction: column; gap: 10px; }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 14px 16px;
            color: var(--text-primary); text-decoration: none; border-radius: var(--radius-md);
            transition: all 0.3s ease; font-weight: bold; font-size: 14px;
        }

        .nav-link:hover { background-color: rgba(255, 255, 255, 0.05); transform: translateX(-3px); }
        .nav-link.active {
            background-color: var(--gold-subtle); color: var(--gold-dark);
            border-right: 4px solid var(--gold-dark); transform: translateX(-5px);
        }

        /* ===== MAIN CONTENT (مرن الآن) ===== */
        .main-wrapper {
            margin-right: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: margin-right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* كلاس التمدد الجديد */
        .main-wrapper.expanded {
            margin-right: 0;
        }

        .top-navbar {
            height: 60px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between; /* توزيع المسافة بين زر القائمة والبروفايل */
            padding: 0 var(--space-5);
        }

        /* زر الهامبرغر الجديد */
        .menu-toggle-btn {
            background: none;
            border: none;
            color: var(--gold-dark);
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-toggle-btn:hover { background: rgba(245, 166, 35, 0.1); transform: scale(1.05); }

        .user-profile {
            display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--gold-dark);
            font-weight: bold; background: var(--gold-subtle); padding: 6px 16px;
            border-radius: 50px; border: 1px solid rgba(245, 166, 35, 0.2);
        }

        .content-area { padding: var(--space-5); flex: 1; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .hidden { display: none !important; }
        .modal-card { background: var(--bg-card); padding: var(--space-5); border-radius: 16px; width: 100%; border: 1px solid var(--border-color); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .form-label { display: block; font-size: 12px; font-weight: bold; color: var(--text-muted); margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 12px; background: var(--bg-body); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-primary); outline: none; transition: 0.2s; }
        .form-input:focus { border-color: var(--gold-dark); box-shadow: 0 0 0 2px var(--gold-subtle); }
        .btn { padding: 8px 16px; border-radius: var(--radius-md); font-weight: bold; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; border: none; }
        .btn-primary { background: var(--gold-dark); color: #1a0f00; }
        .btn-primary:hover { background: #ffb732; transform: translateY(-1px); }
    </style>
</head>
<body>

    <aside class="sidebar" id="app-sidebar">
        <div class="sidebar-header">
            <img src="/static/img/logo.jpg" alt="اللوجو" class="brand-logo" onerror="this.src='https://via.placeholder.com/85/1a0f00/f5a623?text=Logo'">
            <h1>بيت الطباعة والألوان</h1>
            <p style="color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 6px;">ERP System v2.0</p>
        </div>
        
        <nav class="nav-links">
            <a href="/" class="nav-link">
                <span style="font-size: 18px;">📊</span> إدارة الطلبات
            </a>
            <a href="/finance" class="nav-link">
                <span style="font-size: 18px;">💼</span> الخزينة والحسابات
            </a>
            <a href="/marketing" class="nav-link">
                <span style="font-size: 18px;">📢</span> الدعاية والإعلان
            </a>
            <a href="/settings" class="nav-link">
                <span style="font-size: 18px;">⚙️</span> الإعدادات
            </a>
        </nav>
    </aside>

    <div class="main-wrapper" id="main-content">
        <header class="top-navbar">
            <button class="menu-toggle-btn" onclick="toggleSidebar()" title="إظهار / إخفاء القائمة الجانبية">
                ☰
            </button>
            
            <div class="user-profile">
                <span>👨‍💼 أهلاً بك يا حسام</span>
            </div>
        </header>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% include "components/modal.html" %}

    <script>
        // دوال النافذة المنبثقة
        function openModal() { document.getElementById('main-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('main-modal').classList.add('hidden'); }
        
        // 👇 دالة التحكم في القائمة الجانبية (جديد) 👇
        function toggleSidebar() {
            document.getElementById('app-sidebar').classList.toggle('collapsed');
            document.getElementById('main-content').classList.toggle('expanded');
        }
        
        // تفعيل الرابط النشط
        document.addEventListener("DOMContentLoaded", function() {
            const currentPath = window.location.pathname;
            const links = document.querySelectorAll('.nav-link');
            
            links.forEach(link => {
                link.classList.remove('active');
                const href = link.getAttribute('href');
                if (currentPath === href || (currentPath.startsWith('/orders') && href === '/')) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
