{% extends "base.html" %}
{% block title %}الخزينة والحسابات{% endblock %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h2 style="color: var(--text-primary); margin: 0;">الخزينة والحسابات 📊</h2>
    <button class="btn btn-primary" style="font-size: 12px; padding: 6px 12px; opacity: 0.5; cursor: not-allowed;" title="سيتم تفعيلها قريباً">➕ إضافة مصروف يدوي</button>
</div>

<div hx-get="/orders/finance/dashboard-data" hx-trigger="load" hx-swap="innerHTML">
    <div style="text-align: center; padding: 60px; color: var(--gold-dark);">
        <div style="font-size: 40px; margin-bottom: 16px; animation: spin 2s linear infinite;">⚙️</div>
        <h3>جاري جلب البيانات من الخزينة المركزية...</h3>
    </div>
</div>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
{% endblock %}
