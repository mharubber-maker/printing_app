{% extends "base.html" %}
{% block title %}الخزينة والحسابات{% endblock %}
{% block content %}
<div style="animation: fadeIn 0.5s;">
    <h2 style="color: var(--gold-dark); margin-bottom: 20px;">💼 الخزينة والحسابات (المركز المالي)</h2>
    <div style="background: var(--bg-card); padding: 60px 20px; border-radius: 16px; text-align: center; border: 1px dashed var(--gold-dark); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <div style="font-size: 64px; margin-bottom: 16px; animation: bounce 2s infinite;">🚧</div>
        <h3 style="color: var(--text-primary); font-size: 24px;">جاري بناء المحرك المالي...</h3>
        <p style="color: var(--text-muted); margin-top: 12px; font-size: 14px;">سنقوم هنا بعرض دفتر الأستاذ، الأرباح الصافية، وتكلفة المصنع والشحن.</p>
    </div>
</div>
<style>@keyframes fadeIn {from{opacity:0;}to{opacity:1;}} @keyframes bounce {0%, 100%{transform:translateY(0);} 50%{transform:translateY(-10px);}}</style>
{% endblock %}
