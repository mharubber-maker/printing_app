{% extends "base.html" %}
{% block title %}الدعاية والإعلان{% endblock %}
{% block content %}
<div style="animation: fadeIn 0.5s;">
    <h2 style="color: var(--gold-dark); margin-bottom: 20px;">📢 الدعاية والإعلان</h2>
    <div style="background: var(--bg-card); padding: 60px 20px; border-radius: 16px; text-align: center; border: 1px dashed var(--border-color);">
        <div style="font-size: 64px; margin-bottom: 16px;">🎯</div>
        <h3 style="color: var(--text-primary); font-size: 24px;">قسم التسويق والمبيعات</h3>
        <p style="color: var(--text-muted); margin-top: 12px; font-size: 14px;">مكان تسجيل مصاريف الإعلانات (فيسبوك، جوجل) وحساب تكلفة العميل.</p>
    </div>
</div>
<style>@keyframes fadeIn {from{opacity:0;}to{opacity:1;}}</style>
{% endblock %}
