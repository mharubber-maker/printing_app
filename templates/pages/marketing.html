{% extends "base.html" %}
{% block title %}الدعاية والإعلان{% endblock %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h2 style="color: var(--text-primary); margin: 0;">الدعاية والإعلان 📢</h2>
</div>

<div id="marketing-container" hx-get="/orders/marketing/data" hx-trigger="load" hx-swap="innerHTML">
    <div style="text-align: center; padding: 60px; color: var(--gold-dark);">
        <div style="font-size: 40px; margin-bottom: 16px; animation: spin 2s linear infinite;">🎯</div>
        <h3>جاري تحميل بيانات التسويق...</h3>
    </div>
</div>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
</style>
{% endblock %}
