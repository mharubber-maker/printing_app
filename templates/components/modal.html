<div id="main-modal" class="modal-overlay hidden" style="z-index: 99999;">
    <div class="modal-card" style="max-width: 800px; padding: 0; display: flex; flex-direction: column; max-height: 90vh;">
        
        <div style="padding: 20px 24px; border-bottom: 1px solid var(--border-color); background: var(--bg-table-head); display: flex; justify-content: space-between; align-items: center; border-radius: 16px 16px 0 0;">
            <h2 style="margin: 0; font-size: 20px; color: var(--gold-dark);">➕ إضافة طلب جديد</h2>
            <button type="button" onclick="closeModal()" style="background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; transition: 0.2s;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--text-muted)'">&times;</button>
        </div>

        <div style="padding: 24px; overflow-y: auto; flex: 1; background: var(--bg-body);">
            <form hx-post="/orders/add" hx-target="#orders-table-body" hx-swap="beforeend" enctype="multipart/form-data" onsubmit="setTimeout(() => { closeModal(); this.reset(); }, 500);">
                
                <div style="margin-bottom: 24px; background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color);">
                    <h3 style="margin: 0 0 16px 0; font-size: 14px; color: #38bdf8; border-right: 3px solid #38bdf8; padding-right: 8px;">👤 بيانات العميل</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div>
                            <label class="form-label">اسم العميل *</label>
                            <input type="text" name="customer_name" class="form-input" required placeholder="مثال: أحمد محمد">
                        </div>
                        <div>
                            <label class="form-label">رقم التليفون</label>
                            <input type="text" name="customer_phone" class="form-input" placeholder="مثال: 01012345678">
                        </div>
                        <div style="grid-column: 1 / -1;">
                            <label class="form-label">العنوان بالتفصيل</label>
                            <input type="text" name="customer_address" class="form-input" placeholder="المحافظة - المدينة - الشارع - رقم العمارة">
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 24px; background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h3 style="margin: 0; font-size: 14px; color: var(--gold-dark); border-right: 3px solid var(--gold-dark); padding-right: 8px;">🧶 تفاصيل السجاد (التصميم والمقاس)</h3>
                        <button type="button" onclick="addRugItem()" style="background: rgba(245,166,35,0.1); color: var(--gold-dark); border: 1px solid var(--gold-dark); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;" onmouseover="this.style.background='var(--gold-dark)'; this.style.color='#1a0f00';">+ إضافة سجادة أخرى</button>
                    </div>
                    
                    <div id="rug-items-container">
                        <div class="rug-item" style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; padding: 16px; background: rgba(0,0,0,0.2); border: 1px dashed var(--border-color); border-radius: 8px; margin-bottom: 12px;">
                            <div>
                                <label class="form-label">الطول (م)</label>
                                <input type="number" step="0.01" name="lengths" class="form-input" required placeholder="مثال: 3" oninput="calculateTotals()">
                            </div>
                            <div>
                                <label class="form-label">العرض (م)</label>
                                <input type="number" step="0.01" name="widths" class="form-input" required placeholder="مثال: 2" oninput="calculateTotals()">
                            </div>
                            <div>
                                <label class="form-label">سعر متر البيع (ج)</label>
                                <input type="number" step="0.01" name="prices_per_m2" class="form-input" required placeholder="للعميل" oninput="calculateTotals()">
                            </div>
                            <div>
                                <label class="form-label">تكلفة المتر (ج)</label>
                                <input type="number" step="0.01" name="factory_prices_per_m2" class="form-input" required placeholder="للمصنع">
                            </div>
                            <div style="grid-column: 1 / -1;">
                                <label class="form-label">صورة التصميم</label>
                                <input type="file" name="item_images" class="form-input" accept="image/*" style="padding: 6px; background: var(--bg-body);">
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 24px; background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color);">
                    <h3 style="margin: 0 0 16px 0; font-size: 14px; color: #a855f7; border-right: 3px solid #a855f7; padding-right: 8px;">🚚 المواعيد وملاحظات التشغيل</h3>
                    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 16px;">
                        <div>
                            <label class="form-label">تاريخ التسليم المتفق عليه</label>
                            <input type="date" name="delivery_date" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">ملاحظات (تظهر في الفاتورة)</label>
                            <input type="text" name="notes" class="form-input" placeholder="أي تفاصيل إضافية...">
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 16px; background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color);">
                    <h3 style="margin: 0 0 16px 0; font-size: 14px; color: #10b981; border-right: 3px solid #10b981; padding-right: 8px;">💵 الحسابات والتحصيل</h3>
                    
                    <div style="display: flex; justify-content: space-around; background: rgba(16, 185, 129, 0.05); padding: 16px; border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.2); margin-bottom: 16px;">
                        <div style="text-align: center;">
                            <span style="font-size: 11px; color: var(--text-muted); display: block;">المساحة الإجمالية المقدرة</span>
                            <strong id="live-total-area" style="color: var(--text-primary); font-size: 22px;">0.00 م²</strong>
                        </div>
                        <div style="text-align: center;">
                            <span style="font-size: 11px; color: var(--text-muted); display: block;">الإجمالي العام للطلب</span>
                            <strong id="live-total-price" style="color: var(--gold-dark); font-size: 22px;">0.00 ج</strong>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
                        <div>
                            <label class="form-label">المدفوع مقدماً (عربون)</label>
                            <input type="number" step="0.01" name="paid_amount" class="form-input" value="0">
                        </div>
                        <div>
                            <label class="form-label">طريقة الدفع</label>
                            <select name="payment_method" class="form-input" style="padding: 10px 12px; height: 40px; cursor: pointer;">
                                <option value="كاش">كاش (نقدي)</option>
                                <option value="فودافون كاش">فودافون كاش</option>
                                <option value="إنستاباي">إنستاباي (InstaPay)</option>
                                <option value="تحويل بنكي">تحويل بنكي</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">إيصال التحويل (إن وجد)</label>
                            <input type="file" name="transfer_receipt" class="form-input" accept="image/*" style="padding: 6px; background: var(--bg-body);">
                        </div>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--border-color); padding-top: 20px; background: var(--bg-card); margin: -24px -24px 0 -24px; padding: 16px 24px; border-radius: 0 0 16px 16px;">
                    <button type="button" onclick="closeModal()" class="btn" style="background: transparent; color: var(--text-muted); border: 1px solid var(--border-color);">إلغاء</button>
                    <button type="submit" class="btn btn-primary" style="background: #10b981; color: white; border: none; font-size: 15px; padding: 10px 24px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);">💾 حفظ وإنشاء الطلب</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function addRugItem() {
        const container = document.getElementById('rug-items-container');
        const itemHtml = `
            <div class="rug-item" style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; padding: 16px; background: rgba(0,0,0,0.2); border: 1px dashed var(--border-color); border-radius: 8px; margin-bottom: 12px; position: relative; animation: fadeIn 0.3s;">
                <button type="button" onclick="this.parentElement.remove(); calculateTotals();" style="position: absolute; top: -10px; left: -10px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5);">✖</button>
                <div><label class="form-label">الطول (م)</label><input type="number" step="0.01" name="lengths" class="form-input" required oninput="calculateTotals()"></div>
                <div><label class="form-label">العرض (م)</label><input type="number" step="0.01" name="widths" class="form-input" required oninput="calculateTotals()"></div>
                <div><label class="form-label">سعر متر البيع</label><input type="number" step="0.01" name="prices_per_m2" class="form-input" required oninput="calculateTotals()"></div>
                <div><label class="form-label">تكلفة المتر</label><input type="number" step="0.01" name="factory_prices_per_m2" class="form-input" required></div>
                <div style="grid-column: 1 / -1;"><label class="form-label">صورة التصميم</label><input type="file" name="item_images" class="form-input" accept="image/*" style="padding: 6px; background: var(--bg-body);"></div>
            </div>`;
        container.insertAdjacentHTML('beforeend', itemHtml);
    }

    function calculateTotals() {
        const items = document.querySelectorAll('.rug-item');
        let totalArea = 0;
        let totalPrice = 0;
        
        items.forEach(item => {
            const l = parseFloat(item.querySelector('[name="lengths"]').value) || 0;
            const w = parseFloat(item.querySelector('[name="widths"]').value) || 0;
            const p = parseFloat(item.querySelector('[name="prices_per_m2"]').value) || 0;
            
            const area = l * w;
            totalArea += area;
            totalPrice += area * p;
        });
        
        document.getElementById('live-total-area').innerText = totalArea.toFixed(2) + ' م²';
        document.getElementById('live-total-price').innerText = totalPrice.toFixed(2) + ' ج';
    }
</script>
