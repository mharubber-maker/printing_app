<div id="main-modal" class="modal-overlay hidden">
    <div class="modal-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-5)">
            <h2 style="font-size:var(--text-lg);font-weight:var(--font-black);color:var(--text-primary)">➕ طلب جديد</h2>
            <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:22px;color:var(--text-muted);line-height:1">✕</button>
        </div>

        <form id="order-form" hx-post="/orders/add" hx-target="#orders-table-body" hx-swap="afterbegin" hx-encoding="multipart/form-data" style="display:flex;flex-direction:column;gap:var(--space-4)">
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">
                <div><label class="form-label">اسم العميل *</label><input name="customer_name" type="text" required class="form-input"></div>
                <div><label class="form-label">رقم التليفون</label><input name="customer_phone" type="tel" class="form-input"></div>
            </div>

            <div style="background:var(--bg-card); padding:10px; border-radius:8px; border:1px solid var(--border-color);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <label class="form-label" style="margin:0;">تفاصيل السجاد</label>
                    <button type="button" onclick="addRugRow()" style="background:var(--gold-subtle); color:var(--gold-dark); border:none; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:bold;">+ إضافة مقاس</button>
                </div>
                
                <div id="rugs-container">
                    <div class="rug-row" style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:var(--space-2);align-items:start;margin-bottom:8px;">
                        <div>
                            <input name="lengths" type="number" step="0.1" min="0.1" placeholder="الطول(م)" required class="form-input smart-calc">
                        </div>
                        <div>
                            <input name="widths" type="number" step="0.1" min="0.1" placeholder="العرض(م)" required class="form-input smart-calc">
                        </div>
                        <div>
                            <input name="prices_per_m2" type="number" step="0.5" min="0" placeholder="السعر/م²" required class="form-input smart-calc">
                        </div>
                        <button type="button" onclick="removeRugRow(this)" style="background:none; border:none; color:var(--text-muted); padding:10px; cursor:not-allowed;" disabled>✕</button>
                    </div>
                </div>
            </div>

            <div>
                <label class="form-label">المدفوع مقدماً للإجمالي (ج)</label>
                <input id="calc-paid" name="paid_amount" type="number" step="1" min="0" value="0" class="form-input smart-calc">
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3); background: var(--bg-card); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);">
                <div>
                    <label class="form-label">طريقة الدفع 💳</label>
                    <select id="payment-method-select" name="payment_method" class="form-input">
                        <option value="كاش">كاش 💵</option>
                        <option value="فودافون كاش">فودافون كاش 🔴</option>
                        <option value="انستا باي">انستا باي 🟣</option>
                        <option value="تحويل بنكي">تحويل بنكي 🏦</option>
                    </select>
                </div>
                <div id="payment-ref-container" style="display: none;">
                    <label class="form-label" id="ref-label">رقم العملية / الموبايل *</label>
                    <input id="payment-ref-input" name="payment_ref" type="text" placeholder="مطلوب للتحويلات" class="form-input">
                </div>
            </div>

            <div style="background:var(--bg-body); border:1px solid rgba(245,166,35,0.4); border-radius:var(--radius-md); padding:var(--space-3); text-align:center; display: flex; justify-content: space-between;">
                <div><p style="font-size:var(--text-xs);color:var(--text-muted)">المساحة الإجمالية</p><p id="res-area" style="font-weight:bold;color:var(--text-primary)">0 م²</p></div>
                <div><p style="font-size:var(--text-xs);color:var(--text-muted)">الإجمالي العام</p><p id="res-total" style="font-weight:bold;color:var(--text-primary)">0 ج</p></div>
                <div><p style="font-size:var(--text-xs);color:var(--text-muted)">حالة الدفع</p><p id="res-status" style="font-weight:bold;color:red">لم يدفع 🔴</p></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">
                <div><label class="form-label">تاريخ التسليم</label><input name="delivery_date" type="date" class="form-input"></div>
                <div><label class="form-label">صورة الطلب</label><input name="image" type="file" accept="image/*" class="form-input" style="padding:6px 12px"></div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:var(--text-base)">💾 حفظ الطلب وإصدار الفاتورة</button>
        </form>
    </div>
</div>

<script>
    function addRugRow() {
        const container = document.getElementById('rugs-container');
        const row = document.createElement('div');
        row.className = 'rug-row';
        row.style = 'display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:var(--space-2);align-items:start;margin-bottom:8px;';
        row.innerHTML = `
            <div><input name="lengths" type="number" step="0.1" min="0.1" placeholder="الطول(م)" required class="form-input smart-calc"></div>
            <div><input name="widths" type="number" step="0.1" min="0.1" placeholder="العرض(م)" required class="form-input smart-calc"></div>
            <div><input name="prices_per_m2" type="number" step="0.5" min="0" placeholder="السعر/م²" required class="form-input smart-calc"></div>
            <button type="button" onclick="removeRugRow(this)" style="background:none; border:none; color:#ef4444; padding:10px; cursor:pointer; font-weight:bold;">✕</button>
        `;
        container.appendChild(row);
        updateRemoveButtons();
    }

    function removeRugRow(btn) {
        const container = document.getElementById('rugs-container');
        if (container.children.length > 1) {
            btn.parentElement.remove();
            updateRemoveButtons();
            document.body.dispatchEvent(new Event('input', {bubbles: true})); 
        }
    }

    function updateRemoveButtons() {
        const rows = document.querySelectorAll('.rug-row');
        const firstBtn = rows[0].querySelector('button');
        if (rows.length === 1) {
            firstBtn.style.color = 'var(--text-muted)'; firstBtn.style.cursor = 'not-allowed'; firstBtn.disabled = true;
        } else {
            firstBtn.style.color = '#ef4444'; firstBtn.style.cursor = 'pointer'; firstBtn.disabled = false;
        }
    }

    document.body.addEventListener('input', function(e) {
        if (e.target.id === 'payment-method-select') {
            const refContainer = document.getElementById('payment-ref-container');
            const refInput = document.getElementById('payment-ref-input');
            if(e.target.value !== 'كاش') {
                refContainer.style.display = 'block'; refInput.setAttribute('required', 'true');
            } else {
                refContainer.style.display = 'none'; refInput.removeAttribute('required'); refInput.value = '';
            }
        }

        if (e.target.classList.contains('smart-calc') || e.target.id === 'calc-paid') {
            const lengths = document.querySelectorAll('input[name="lengths"]');
            const widths = document.querySelectorAll('input[name="widths"]');
            const prices = document.querySelectorAll('input[name="prices_per_m2"]');
            const paidInput = document.getElementById('calc-paid');
            let paid = parseFloat(paidInput?.value) || 0;

            let total_area = 0;
            let total_price = 0;
            
            for(let i=0; i<lengths.length; i++){
                const l = parseFloat(lengths[i].value) || 0;
                const w = parseFloat(widths[i].value) || 0;
                const p = parseFloat(prices[i].value) || 0;
                
                const area = l * w;
                total_area += area;
                total_price += (area * p); // ضرب مساحة كل سجادة في سعرها المستقل
            }

            if (paid > total_price && total_price > 0) { paidInput.value = total_price; paid = total_price; }
            const remaining = total_price - paid;

            document.getElementById('res-area').innerText = total_area.toFixed(2) + ' م²';
            document.getElementById('res-total').innerText = total_price.toFixed(2) + ' ج';

            const statusEl = document.getElementById('res-status');
            if (total_price === 0) {
                statusEl.innerText = 'بانتظار السعر ⏳'; statusEl.style.color = 'var(--text-muted)';
            } else if (remaining <= 0) {
                statusEl.innerText = 'خالص ✅'; statusEl.style.color = '#10b981';
            } else if (paid > 0) {
                statusEl.innerText = `متبقي: ${remaining.toFixed(1)} ج 🟡`; statusEl.style.color = '#f5a623';
            } else {
                statusEl.innerText = `آجل (لم يدفع) 🔴`; statusEl.style.color = '#ef4444';
            }
        }
    });

    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.target.id === 'orders-table-body' && evt.detail.successful) {
            if (typeof closeModal === 'function') { closeModal(); } else { document.getElementById('main-modal').classList.add('hidden'); }
            document.getElementById('order-form').reset();
            
            const container = document.getElementById('rugs-container');
            while (container.children.length > 1) { container.removeChild(container.lastChild); }
            updateRemoveButtons();

            document.getElementById('res-area').innerText = '0 م²';
            document.getElementById('res-total').innerText = '0 ج';
            document.getElementById('res-status').innerText = 'لم يدفع 🔴';
            document.getElementById('res-status').style.color = '#ef4444';
            document.getElementById('payment-ref-container').style.display = 'none';

            const emptyMsg = document.querySelector('#orders-table-body td[colspan="6"]');
            if (emptyMsg) emptyMsg.parentElement.style.display = 'none';
        }
    });
</script>
